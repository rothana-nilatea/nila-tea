<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate, max-age=0">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="-1">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Nila Tea">
<meta name="theme-color" content="#7B3F1E">
<title>Nila Tea POS</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="logo.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --g:#7B3F1E;--gl:#FDF0E6;--gt:#5C2E0E;
  --bg:#FBF5EF;--card:#fff;--bd:#E8EDE8;--bd2:#D1D9D1;
  --t1:#111;--t2:#6A7A6A;--t3:#9AAA9A;
  --red:#B03030;--rbg:#FDECEC;
  --amb:#8A5A00;--abg:#FFF3DC;
  --aba:#4A2C0E;--aba-bg:#F5E6D3;--aba-lt:#2C1A08;
  --cash-c:#8A5A00;--cash-bg:#FFF3DC;
  --atm-c:#C2692A;--atm-bg:#FEF3EA;--atm-lt:#8A3D10;
  --hru-c:#1A7A5E;--hru-bg:#E6F7F2;--hru-lt:#0D5240;
  --r:12px;--r-lg:16px;
  --shadow:0 1px 3px rgba(0,0,0,0.07);
}
html,body{height:100%;font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--t1);font-size:14px;overflow:hidden;}
.app{display:flex;flex-direction:column;height:100vh;height:100dvh;max-width:430px;margin:0 auto;background:var(--bg);position:relative;}

/* ── TOPBAR ── */
.topbar{background:var(--card);border-bottom:1px solid var(--bd);padding:0 14px;height:52px;display:flex;align-items:center;gap:10px;flex-shrink:0;z-index:10;position:relative;border-top:4px solid var(--store-color,var(--g));}
.ham{width:36px;height:36px;border-radius:10px;background:var(--bg);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.pg-lbl{font-size:15px;font-weight:700;color:var(--t1);flex:1;}
.store-pill{font-size:10px;font-weight:700;padding:4px 10px;border-radius:99px;border:none;cursor:pointer;font-family:inherit;}

/* ── DRAWER ── */
.ov{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:40;display:none;}
.ov.open{display:block;}
.drawer{position:fixed;top:0;left:-280px;width:280px;height:100%;background:var(--card);z-index:50;display:flex;flex-direction:column;transition:left 0.25s cubic-bezier(0.4,0,0.2,1);box-shadow:4px 0 20px rgba(0,0,0,0.15);}
.drawer.open{left:0;}
.d-top{background:var(--store-color,var(--g));padding:48px 16px 16px;}
.d-logo-row{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
.d-logo-ico{width:40px;height:40px;border-radius:12px;background:rgba(255,255,255,0.15);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.d-app-name{font-size:16px;font-weight:700;color:#fff;}
.d-app-sub{font-size:10px;color:rgba(255,255,255,0.55);margin-top:1px;}
.d-close{margin-left:auto;width:28px;height:28px;background:rgba(255,255,255,0.15);border:none;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;}
.d-user{background:rgba(255,255,255,0.12);border-radius:11px;padding:10px 12px;display:flex;align-items:center;gap:9px;}
.d-av{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,0.2);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff;flex-shrink:0;}
.d-uname{font-size:13px;font-weight:600;color:#fff;}
.d-urole{font-size:10px;color:rgba(255,255,255,0.6);margin-top:1px;}

/* store switcher */
.store-sw{padding:12px 12px 4px;}
.store-sw-title{font-size:9px;font-weight:700;color:var(--t3);letter-spacing:0.8px;text-transform:uppercase;margin-bottom:6px;}
.store-opts{display:flex;flex-direction:column;gap:4px;}
.store-opt{display:flex;align-items:center;gap:8px;padding:9px 10px;border-radius:10px;cursor:pointer;border:none;background:transparent;font-family:inherit;width:100%;text-align:left;transition:all 0.15s;}
.store-opt:hover{background:var(--bg);}
.store-opt.sel{background:var(--gl);}
.store-opt-ico{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;flex-shrink:0;}
.store-opt-name{font-size:13px;font-weight:600;color:var(--t1);}
.store-opt-sub{font-size:10px;color:var(--t2);}
.store-opt.sel .store-opt-name{color:var(--gt);}

.d-nav{flex:1;overflow-y:auto;padding:8px 10px;}
.d-sec{font-size:9px;font-weight:700;color:var(--t3);letter-spacing:0.8px;text-transform:uppercase;padding:10px 8px 4px;}
.d-item{display:flex;align-items:center;gap:10px;padding:10px 10px;border-radius:10px;cursor:pointer;font-size:13px;font-weight:500;color:var(--t2);border:none;background:transparent;font-family:inherit;width:100%;text-align:left;transition:all 0.15s;margin-bottom:1px;}
.d-item:hover{background:var(--bg);color:var(--t1);}
.d-item.active{background:var(--gl);color:var(--gt);font-weight:600;}
.d-ico{width:32px;height:32px;border-radius:9px;background:var(--bg);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.d-item.active .d-ico{background:#F5DCCA;}
.d-bot{padding:10px 10px 28px;border-top:1px solid var(--bd);}
.logout-row{display:flex;align-items:center;gap:10px;padding:10px 10px;border-radius:10px;cursor:pointer;font-size:13px;font-weight:500;color:var(--red);border:none;background:transparent;font-family:inherit;width:100%;}
.logout-row:hover{background:var(--rbg);}
.lo-ico{width:32px;height:32px;border-radius:9px;background:var(--rbg);display:flex;align-items:center;justify-content:center;flex-shrink:0;}

/* ── CONTENT ── */
.content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.page{display:none;padding:12px;padding-bottom:20px;}.page.active{display:block;}

/* ── SHARED ── */
.pg-title{font-size:18px;font-weight:700;color:var(--t1);margin-bottom:2px;}
.pg-sub{font-size:12px;color:var(--t2);margin-bottom:12px;}
.sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.sh-t{font-size:13px;font-weight:700;color:var(--t1);}
.card{background:var(--card);border-radius:var(--r);border:0.5px solid var(--bd);box-shadow:var(--shadow);margin-bottom:9px;}
.cb{padding:12px 13px;}
.row{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:0.5px solid var(--bd);}
.row:last-child{border:none;}
.btn{font-size:12px;font-weight:600;padding:7px 13px;border-radius:9px;border:1.5px solid var(--bd2);background:transparent;color:var(--t1);cursor:pointer;font-family:inherit;transition:all 0.15s;}
.btn:active{opacity:0.8;}
.btn.p{background:var(--store-color,var(--g));color:#fff;border-color:var(--store-color,var(--g));}
.btn.d{color:var(--red);border-color:rgba(176,48,48,0.3);}
.btn.sm{font-size:11px;padding:5px 10px;}
.btn.full{width:100%;padding:13px;font-size:14px;border-radius:12px;}
.badge{font-size:9px;font-weight:700;padding:3px 8px;border-radius:99px;display:inline-block;}
.bg-g{background:var(--gl);color:var(--gt);}
.bg-a{background:var(--abg);color:var(--amb);}
.bg-gr{background:#F0F0F0;color:#8A8A8A;}
.bg-r{background:var(--rbg);color:var(--red);}
.bg-aba{background:var(--aba-bg);color:var(--aba-lt);}
.bg-cash{background:var(--cash-bg);color:var(--cash-c);}
.bg-atm{background:var(--atm-bg);color:var(--atm-lt);}
.bg-hru{background:var(--hru-bg);color:var(--hru-lt);}
.fl{font-size:11px;font-weight:600;color:var(--t2);margin-bottom:4px;}
.fi{width:100%;font-size:13px;padding:9px 11px;border:1.5px solid var(--bd2);border-radius:10px;background:var(--bg);color:var(--t1);font-family:inherit;-webkit-appearance:none;}
.fi:focus{outline:none;border-color:var(--g);}
.bar-row{margin-bottom:8px;}
.bar-l{display:flex;justify-content:space-between;font-size:11px;color:var(--t2);margin-bottom:3px;}
.bar-t{height:5px;background:var(--bg);border-radius:99px;overflow:hidden;}
.bar-f{height:5px;background:var(--store-color,var(--g));border-radius:99px;}
.tog{width:40px;height:23px;border-radius:11.5px;border:none;cursor:pointer;position:relative;flex-shrink:0;}
.tog.on{background:var(--store-color,var(--g));}.tog.off{background:#CDD5CD;}
.tog-k{position:absolute;top:2px;width:19px;height:19px;border-radius:50%;background:#fff;transition:left 0.18s;}
.tog.on .tog-k{left:19px;}.tog.off .tog-k{left:2px;}

/* ── DASHBOARD OWNER ── */
.combined-card{border-radius:var(--r-lg);padding:16px;margin-bottom:12px;}
.gt-label{font-size:11px;font-weight:600;color:rgba(255,255,255,0.65);margin-bottom:6px;}
.gt-val{font-size:28px;font-weight:700;color:#fff;line-height:1;}
.gt-khr{font-size:12px;color:rgba(255,255,255,0.55);margin-top:3px;}
.gt-breakdown{display:flex;gap:8px;margin-top:12px;}
.gt-part{flex:1;background:rgba(255,255,255,0.12);border-radius:9px;padding:9px 11px;}
.gt-part-lbl{font-size:9px;font-weight:700;color:rgba(255,255,255,0.55);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px;}
.gt-part-val{font-size:15px;font-weight:700;color:#fff;}
.cmp-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
.cmp-card{border-radius:var(--r);padding:12px;border:1.5px solid transparent;}
.cmp-card.atm{background:var(--atm-bg);border-color:#E8A87A;}
.cmp-card.hru{background:var(--hru-bg);border-color:#7EC8B0;}
.cmp-store{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px;display:flex;align-items:center;gap:5px;}
.cmp-dot{width:7px;height:7px;border-radius:50%;}
.cmp-lbl{font-size:10px;color:var(--t2);margin-bottom:2px;}
.cmp-val{font-size:17px;font-weight:700;color:var(--t1);}
.cmp-sub{font-size:10px;color:var(--t2);margin-top:2px;margin-bottom:8px;}
.cmp-div{height:0.5px;background:rgba(0,0,0,0.08);margin:7px 0;}

/* ── METRICS ── */
.metrics{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
.mc{background:var(--card);border-radius:var(--r);border:0.5px solid var(--bd);padding:12px;box-shadow:var(--shadow);}
.mc.acc{background:var(--g);border-color:var(--g);}
.mc-ico{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;margin-bottom:8px;}
.mc-l{font-size:10px;font-weight:500;color:var(--t2);margin-bottom:2px;}
.mc-l.w{color:rgba(255,255,255,0.65);}
.mc-v{font-size:20px;font-weight:700;color:var(--t1);}
.mc-v.w{color:#fff;}
.mc-s{font-size:10px;color:var(--t3);margin-top:2px;}
.mc-s.w{color:rgba(255,255,255,0.5);}

/* ── SALE FORM ── */
.pay-opts{display:flex;gap:8px;margin-bottom:12px;}
.pay-opt{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;padding:12px 8px;border-radius:12px;border:2px solid var(--bd2);background:var(--bg);cursor:pointer;transition:all 0.15s;}
.pay-opt.sel-cash{border-color:var(--cash-c);background:var(--cash-bg);}
.pay-opt.sel-aba{border-color:var(--aba);background:var(--aba-bg);}
.pay-opt-ico{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;}
.pay-opt-name{font-size:12px;font-weight:700;color:var(--t1);}
.pay-opt.sel-cash .pay-opt-name{color:var(--cash-c);}
.pay-opt.sel-aba .pay-opt-name{color:var(--aba-lt);}
.quick-amt{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px;}
.qa{font-size:12px;font-weight:600;padding:6px 11px;border-radius:8px;border:1.5px solid var(--bd2);background:var(--bg);color:var(--t1);cursor:pointer;font-family:inherit;}
.qa:active{background:var(--gl);border-color:var(--g);color:var(--g);}
.sale-item{background:var(--card);border-radius:var(--r);border:0.5px solid var(--bd);padding:10px 12px;margin-bottom:7px;display:flex;align-items:center;gap:10px;box-shadow:var(--shadow);}
.sale-ico{width:38px;height:38px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.sale-amt{font-size:15px;font-weight:700;}
.sale-meta{font-size:11px;color:var(--t2);margin-top:2px;}

/* ── INVENTORY ── */
.inv-item{background:var(--card);border-radius:var(--r);border:0.5px solid var(--bd);padding:10px 12px;margin-bottom:7px;box-shadow:var(--shadow);display:flex;align-items:center;gap:10px;}
.inv-th{width:38px;height:38px;border-radius:9px;background:var(--bg);flex-shrink:0;display:flex;align-items:center;justify-content:center;overflow:hidden;}
.inv-th img{width:38px;height:38px;object-fit:cover;}

/* ── MENU ── */
.mg{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.mc2{background:var(--card);border-radius:var(--r);border:0.5px solid var(--bd);overflow:hidden;box-shadow:var(--shadow);}
.mc2-img{width:100%;height:86px;background:var(--bg);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:3px;}
.mc2-img img{width:100%;height:86px;object-fit:cover;display:block;}
.mc2-bd{padding:9px 10px 10px;}
.mc2-cat{font-size:8px;font-weight:700;text-transform:uppercase;color:var(--gt);background:var(--gl);padding:2px 6px;border-radius:99px;display:inline-block;margin-bottom:3px;}
.mc2-name{font-size:12px;font-weight:700;color:var(--t1);}
.mc2-price{font-size:11px;color:var(--t2);margin-top:2px;}

/* ── END STOCK ── */
.si{background:var(--card);border-radius:var(--r);border:0.5px solid var(--bd);padding:11px 12px;margin-bottom:7px;box-shadow:var(--shadow);}
.prog-banner{background:var(--store-color,var(--g));border-radius:var(--r-lg);padding:13px 14px;margin-bottom:10px;}
.prog-t{font-size:14px;font-weight:700;color:#fff;}
.prog-s{font-size:11px;color:rgba(255,255,255,0.65);margin-top:2px;}
.prog-track{background:rgba(255,255,255,0.2);border-radius:99px;height:4px;margin-top:8px;}
.prog-fill{background:#fff;border-radius:99px;height:4px;transition:width 0.3s;}
.prog-labs{display:flex;justify-content:space-between;margin-top:4px;}
.prog-l{font-size:10px;color:rgba(255,255,255,0.6);}
.cam-row{display:flex;align-items:center;gap:8px;padding-top:8px;border-top:0.5px solid var(--bd);}
.cam-box{width:46px;height:46px;border-radius:9px;border:1.5px dashed #C8D8C8;background:#F8FAF8;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:2px;cursor:pointer;flex-shrink:0;display:none;}
.cam-box.done{border-color:var(--g);background:var(--gl);}
.si-sel{font-size:11px;font-weight:600;padding:7px 5px;border:1.5px solid var(--bd2);border-radius:9px;background:var(--bg);color:var(--t1);font-family:inherit;-webkit-appearance:none;text-align:center;width:68px;}
.si-sel.ok{border-color:var(--g);color:var(--g);background:var(--gl);}
.si-sel.low{border-color:#F59F00;color:var(--amb);background:var(--abg);}

/* ── ABA ── */
.aba-logo{width:36px;height:36px;border-radius:9px;background:var(--aba-bg);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--aba-lt);flex-shrink:0;}
.dot-pulse{width:8px;height:8px;border-radius:50%;background:var(--aba);animation:pulse 1.2s ease-in-out infinite;flex-shrink:0;}
@keyframes pulse{0%,100%{opacity:0.3}50%{opacity:1}}
.aba-txn{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:0.5px solid var(--bd);font-size:12px;}
.aba-txn:last-child{border:none;}

/* ── REVENUE CHART ── */
.rev-bars{display:flex;align-items:flex-end;gap:5px;height:80px;margin-bottom:8px;}
.rv-grp{flex:1;display:flex;gap:2px;align-items:flex-end;}
.rv-b{flex:1;border-radius:3px 3px 0 0;}
.rv-day{font-size:9px;color:var(--t3);text-align:center;margin-top:3px;}

/* ── SETTINGS / USERS ── */
.s-card{background:var(--card);border-radius:var(--r);border:0.5px solid var(--bd);overflow:hidden;margin-bottom:9px;box-shadow:var(--shadow);}
.s-row{display:flex;align-items:center;justify-content:space-between;padding:12px 13px;border-bottom:0.5px solid var(--bd);}
.s-row:last-child{border:none;}
.s-l{font-size:13px;font-weight:500;color:var(--t1);}
.s-sub{font-size:10px;color:var(--t3);margin-top:2px;}
.ltab{font-size:11px;font-weight:600;padding:4px 12px;border-radius:99px;border:1.5px solid var(--bd2);background:transparent;color:var(--t2);cursor:pointer;font-family:inherit;}
.ltab.active{background:var(--g);color:#fff;border-color:var(--g);}
.u-card{background:var(--card);border-radius:var(--r);border:0.5px solid var(--bd);padding:12px 13px;margin-bottom:8px;box-shadow:var(--shadow);}
.u-av{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;flex-shrink:0;}
.perm-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-top:10px;}
.perm-item{display:flex;align-items:center;gap:7px;font-size:11px;color:var(--t2);padding:7px 9px;background:var(--bg);border-radius:8px;border:1.5px solid var(--bd);cursor:pointer;transition:all 0.15s;user-select:none;}
.perm-item:hover{border-color:var(--g);}
.perm-item.on{background:var(--gl);border-color:#D4A882;}
.perm-item.on span{color:var(--gt);font-weight:600;}
.pchk{width:15px;height:15px;border-radius:4px;border:1.5px solid var(--bd2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.pchk.on{background:var(--g);border-color:var(--g);}
.warn{background:var(--rbg);border-radius:9px;padding:9px 11px;font-size:12px;color:var(--red);font-weight:500;margin-bottom:8px;display:none;}

/* ── MODAL ── */
.mbg{position:fixed;inset:0;background:rgba(0,0,0,0.5);display:none;align-items:flex-end;justify-content:center;z-index:200;backdrop-filter:blur(3px);}
.mbg.open{display:flex;}
.modal{background:var(--card);border-radius:22px 22px 0 0;padding:20px 18px calc(24px + env(safe-area-inset-bottom));width:100%;max-width:430px;max-height:92vh;overflow-y:auto;}
.mh{width:36px;height:4px;background:var(--bd2);border-radius:99px;margin:0 auto 14px;}
.mt{font-size:17px;font-weight:700;color:var(--t1);margin-bottom:14px;}
.mf{margin-bottom:12px;}
.mf-l{font-size:11px;font-weight:600;color:var(--t2);margin-bottom:4px;}
.mf input,.mf select{width:100%;font-size:14px;padding:10px 12px;border:1.5px solid var(--bd2);border-radius:11px;background:var(--bg);color:var(--t1);font-family:inherit;}
.mf input:focus,.mf select:focus{outline:none;border-color:var(--g);}
.ph-prev{width:100%;height:88px;background:var(--bg);border-radius:11px;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:5px;cursor:pointer;border:2px dashed var(--bd2);overflow:hidden;margin-bottom:4px;}
.ph-prev img{width:100%;height:88px;object-fit:cover;}
.mfoot{display:flex;gap:8px;margin-top:16px;}
.mfoot .btn{flex:1;padding:13px;font-size:14px;}

/* ── LOGIN ── */
.login-wrap{display:flex;align-items:center;justify-content:center;height:100vh;height:100dvh;background:#FBF5EF;padding:20px;}
.login-logo{width:90px;height:90px;background:#7B3F1E;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 14px;overflow:hidden;box-shadow:0 4px 16px rgba(123,63,30,0.3);}
.login-logo img{width:82px;height:82px;object-fit:contain;filter:brightness(0) invert(1);}
.login-box{background:#fff;border-radius:24px;padding:32px 22px;width:100%;max-width:360px;box-shadow:0 4px 24px rgba(123,63,30,0.12);border:0.5px solid #EAD8C8;}
.login-title{font-size:22px;font-weight:700;text-align:center;color:var(--t1);}
.login-sub{font-size:12px;color:var(--t2);text-align:center;margin:3px 0 20px;}
.lf{margin-bottom:12px;}
.lf label{font-size:11px;font-weight:600;color:var(--t2);display:block;margin-bottom:4px;}
.lf input{width:100%;font-size:15px;padding:11px 13px;border:1.5px solid var(--bd2);border-radius:12px;background:var(--bg);color:var(--t1);font-family:inherit;}
.lf input:focus{outline:none;border-color:var(--g);}
.login-err{font-size:12px;color:var(--red);background:var(--rbg);padding:9px 11px;border-radius:9px;margin-bottom:10px;display:none;font-weight:500;}
.login-hint{font-size:10px;color:var(--t3);text-align:center;margin-top:14px;line-height:1.9;background:var(--bg);padding:9px 12px;border-radius:10px;}

/* ── SUCCESS ── */
.success-card{background:var(--card);border-radius:var(--r-lg);border:0.5px solid var(--bd);padding:24px 18px;text-align:center;box-shadow:var(--shadow);}
.s-ico{width:56px;height:56px;background:var(--gl);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 12px;}
.notif-box{background:var(--gl);border-radius:11px;padding:11px 13px;text-align:left;margin:12px 0;}
.notif-title{font-size:12px;font-weight:700;color:var(--gt);}
.notif-sub{font-size:11px;color:#4A7A5A;margin-top:2px;}

<div class="mbg" id="mod-mi"><div class="modal">
  <div class="mh"></div><div class="mt" id="mm-t">Add menu item</div>
  <div class="mf"><div class="mf-l">Name</div><input type="text" id="mm-n" placeholder="e.g. Milk Tea"></div>
  <div class="mf"><div class="mf-l">Category</div><select id="mm-c"><option>Tea</option><option>Coffee</option><option>Smoothie</option><option>Snack</option><option>Other</option></select></div>
  <div class="mf"><div class="mf-l">Price (USD)</div><input type="number" id="mm-p" placeholder="1.50" step="0.25" min="0" inputmode="decimal"></div>
  <div class="mf"><div class="mf-l">Photo</div>
    <div class="ph-prev" id="mm-ph" onclick="document.getElementById('mm-file').click()">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M2 7h16M2 7c0-1.1.9-2 2-2h12c1.1 0 2 .9 2 2v9c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V7z" stroke="#9AAA9A" stroke-width="1.3"/><circle cx="10" cy="11.5" r="2.5" stroke="#9AAA9A" stroke-width="1.3"/></svg>
      <span style="font-size:10px;color:var(--t3);">Tap to upload photo</span>
    </div>
    <input type="file" id="mm-file" accept="image/*" style="display:none;">
  </div>
  <div class="mfoot"><button class="btn" onclick="closeM('mod-mi')">Cancel</button><button class="btn p" onclick="saveMI()">Save item</button></div>
</div></div>

<div class="mbg" id="mod-ii"><div class="modal">
  <div class="mh"></div><div class="mt" id="mi-t">Add ingredient</div>

      <button id="itype-food" onclick="setItemType('food')" style="flex:1;padding:9px;border-radius:10px;border:2px solid var(--bd2);background:transparent;color:var(--t2);font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;">🍞 Food</button>
    </div>
    <input type="hidden" id="mi-type" value="ingredient">
  </div>
  <div style="display:flex;gap:8px;padding:0 0 12px;">
    <div style="flex:1;"><div class="mf-l">Qty</div><input class="fi" type="number" id="mi-q" placeholder="12" inputmode="decimal"></div>
    <div style="flex:1;"><div class="mf-l">Unit</div><select class="fi" id="mi-u"><option>liters</option><option>ml</option><option>grams</option><option>kg</option><option>packs</option><option>pcs</option></select></div>
  </div>
  <div class="mf"><div class="mf-l">Photo</div>
    <div class="ph-prev" id="mi-ph" onclick="document.getElementById('mi-file').click()">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M2 7h16M2 7c0-1.1.9-2 2-2h12c1.1 0 2 .9 2 2v9c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V7z" stroke="#9AAA9A" stroke-width="1.3"/><circle cx="10" cy="11.5" r="2.5" stroke="#9AAA9A" stroke-width="1.3"/></svg>
      <span style="font-size:10px;color:var(--t3);">Tap to upload photo</span>
    </div>
    <input type="file" id="mi-file" accept="image/*" style="display:none;">
  </div>
  <div style="display:flex;align-items:center;justify-content:space-between;background:var(--bg);border-radius:10px;padding:11px 13px;margin-bottom:12px;">
    <div><div style="font-size:13px;font-weight:600;">Count in end-of-day stock</div><div style="font-size:10px;color:var(--t3);margin-top:1px;">Staff counts this daily</div></div>
    <button class="tog on" id="ii-tog" onclick="flipTog()"><div class="tog-k"></div></button>
  </div>
  <div class="mfoot"><button class="btn" onclick="closeM('mod-ii')">Cancel</button><button class="btn p" onclick="saveII()">Save</button></div>
</div></div>

<div class="mbg" id="mod-del"><div class="modal" style="max-height:40vh;">
  <div class="mh"></div><div class="mt" id="del-t">Delete?</div>
  <div style="font-size:13px;color:var(--t2);margin-bottom:4px;" id="del-b"></div>
  <div class="mfoot"><button class="btn" onclick="closeM('mod-del')">Cancel</button><button class="btn d" onclick="confirmDel()">Yes, delete</button></div>
</div></div>

<div class="mbg" id="mod-usr"><div class="modal">
  <div class="mh"></div><div class="mt" id="usr-t">Add user</div>
  <div class="mf"><div class="mf-l">Full name</div><input type="text" id="usr-n" placeholder="e.g. Srey Mom"></div>
  <div class="mf"><div class="mf-l">Username</div><input type="text" id="usr-u" placeholder="e.g. sreymom" autocomplete="off"></div>
  <div class="mf"><div class="mf-l">Password</div><input type="password" id="usr-p" placeholder="••••••"></div>
  <div class="mf"><div class="mf-l">Store</div>
    <select id="usr-s"><option value="atm">ATM — Angtamin Store</option><option value="hru">HRU — Human Resource University</option></select>
  </div>
  <div class="mf"><div class="mf-l">Role</div>
    <select id="usr-r"><option value="staff">Staff</option><option value="owner">Owner/Admin</option></select>
  </div>
  <div class="mfoot"><button class="btn" onclick="closeM('mod-usr')">Cancel</button><button class="btn p" onclick="saveUsr()">Save user</button></div>
</div></div>

// ── API ──
async function api(method,path,body){
  const opts={method,headers:{'Content-Type':'application/json'}};
  if(token) opts.headers['Authorization']='Bearer '+token;
  if(body) opts.body=JSON.stringify(body);
  try{
    const res=await fetch(API+path,opts);
    if(!res.ok){const e=await res.json().catch(()=>({}));throw new Error(e.error||'Error');}
    return res.json();
  }catch(e){
    // Offline fallback — return cached/local data
    console.warn('API error:',e.message);
    throw e;
  }
}

async function loadStoreData(s){
  try{
    const [menu,inv,sales,aba,stats]=await Promise.all([
      api('GET',`/api/stores/${s}/menu`),
      api('GET',`/api/stores/${s}/inventory`),
      api('GET',`/api/stores/${s}/sales`),
      api('GET',`/api/stores/${s}/aba`),
      api('GET',`/api/stores/${s}/revenue/today`),
    ]);
    menuData[s]=menu; invData[s]=inv; salesData[s]=sales; abaData[s]=aba; storeStats[s]=stats;
  }catch(e){console.warn('Could not load data for',s,e.message);}
}

function render(){
  // Apply store color CSS variables before rendering
  if(me && STORES[currentStore]){
    const sc=STORES[currentStore];
    document.documentElement.style.setProperty('--store-color', sc.color);
    document.documentElement.style.setProperty('--store-bg', sc.bg);
    document.documentElement.style.setProperty('--store-lt', sc.lt);
  }
  document.getElementById('root').innerHTML = me ? buildApp() : buildLogin();
}

function buildLogin(){
  return `<div class="login-wrap"><div class="login-box">
    <div class="login-logo"><img src="logo.svg" onerror="this.style.display='none'"></div>
    <div class="login-title">${'Nila Tea'}</div>
    <div class="login-sub">${'Sign in to manage your store'}</div>
    <div class="lf"><label>${'Username'}</label><input type="text" id="l-u" placeholder="admin" autocomplete="username" onkeydown="if(event.key==='Enter')doLogin()"></div>
    <div class="lf"><label>${'Password'}</label><input type="password" id="l-p" placeholder="••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()"></div>
    <div class="login-err" id="l-err">${'Wrong username or password'}</div>
    <button style="width:100%;padding:13px;background:var(--g);color:#fff;border:none;border-radius:13px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:4px;" onclick="doLogin()">${'Sign in'}</button>

  </div></div>`;
}

async function doLogin(){
  const u=document.getElementById('l-u').value.trim(),p=document.getElementById('l-p').value;
  const btn=document.querySelector('.login-box button');
  if(btn){btn.textContent='Signing in...';btn.disabled=true;}
  try{
    const data=await api('POST','/api/login',{username:u,password:p});
    token=data.token; me=data.user;
    localStorage.setItem('nila_token',token);
    currentStore=me.store_id||'atm';
    await loadLogo(true);
    render();
    await loadAllData();
    showPage('dashboard');
  }catch(e){
    const err=document.getElementById('l-err');
    if(err){err.textContent='Wrong username or password';err.style.display='block';}
    if(btn){btn.textContent='Sign in';btn.disabled=false;}
  }
}

async function loadLogo(fetchFromDb=false){
  try{
    // Always use cache first for instant load
    const cached=localStorage.getItem('nila_logo');
    if(cached){logoUrl=cached;}
    // Only fetch from DB if logged in and requested
    if(fetchFromDb && token){
      try{
        const data=await api('GET','/api/logo');
        if(data.logo){
          logoUrl=data.logo;
          localStorage.setItem('nila_logo',data.logo);
        }
      }catch(e){console.warn('Logo DB fetch:',e);}
    }
  }catch(e){console.warn('Logo load:',e);}
}

let _refreshTimer=null;
function startAutoRefresh(){
  if(_refreshTimer)clearInterval(_refreshTimer);
  _refreshTimer=setInterval(async()=>{
    if(me && document.visibilityState==='visible'){
      await loadAllData();
    }
  }, 60000); // refresh every 60 seconds
}

async function refreshDashboard(){
  const btn=event?.target;
  if(btn){btn.disabled=true;btn.textContent='...';}
  await loadAllData();
  if(btn){btn.disabled=false;btn.innerHTML='🔄 '+(lang==='km'?'ធ្វើបច្ចុប្បន្ន':'Refresh');}
}

async function loadAllData(){
  try{
    if(me.role==='owner'){
      await Promise.allSettled([loadStoreData('atm'),loadStoreData('hru')]);
      try{usersData=await api('GET','/api/users');}catch(e){console.warn('Users load:',e);}
    } else {
      await loadStoreData(currentStore);
    }
    // Update refresh timestamp
    const rt=document.getElementById('dash-refresh-time');
    if(rt)rt.textContent=new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
    // Refresh current page with new data
    const activePage=document.querySelector('.page.active');
    if(activePage){
      const id=activePage.id.replace('pg-','');
      activePage.innerHTML=buildPage(id);
    }
  }catch(e){console.warn('loadAllData error:',e);}
}

    <div class="topbar">
      <button class="ham" onclick="toggleDrawer()"><svg width="16" height="12" viewBox="0 0 16 12" fill="none"><path d="M1 1h14M1 6h14M1 11h14" stroke="var(--t1)" stroke-width="1.6" stroke-linecap="round"/></svg></button>

    <!-- PAGES -->
    <div class="content" id="mc">

function buildNavItems(nav){
  let html='',lastSec='';
  const secLabels={Main:t('main'),Manage:t('manage'),Reports:t('reports'),Account:t('account')};
  const navLabels={dashboard:t('dashboard'),sales:t('sales'),closeday:t('closeday'),menu:t('menu'),inventory:t('inventory'),endstock:t('endstock'),revenue:t('revenue'),settings:t('settings')};
  nav.forEach(p=>{
    if(p.sec!==lastSec){html+=`<div class="d-sec">${secLabels[p.sec]||p.sec}</div>`;lastSec=p.sec;}
    html+=`<button class="d-item" id="di-${p.id}" onclick="goPage('${p.id}')">
      <div class="d-ico"><svg width="14" height="14" viewBox="0 0 14 14" fill="none">${p.ico}</svg></div>
      <span>${navLabels[p.id]||p.label}</span>
      ${p.dot?`<div style="margin-left:auto;width:7px;height:7px;background:#E84040;border-radius:50%;"></div>`:''}
    </button>`;
  });
  return html;
}

function toggleDrawer(){
  document.getElementById('drawer').classList.toggle('open');
  document.getElementById('ov').classList.toggle('open');
}
function closeDrawer(){
  document.getElementById('drawer').classList.remove('open');
  document.getElementById('ov').classList.remove('open');
}
function goPage(id){closeDrawer();showPage(id);}

function switchStore(s){
  currentStore=s;
  const st=STORES[s];
  const pill=document.getElementById('store-pill')||document.querySelector('.store-pill');
  if(pill){pill.textContent=st.short;pill.style.background=st.bg;pill.style.color=st.lt;}
  // update drawer store opts
  document.querySelectorAll('.store-opt').forEach(el=>{
    const sid=el.querySelector('.store-opt-ico')?.textContent?.toLowerCase();
    el.classList.toggle('sel',sid===s);
  });
  closeDrawer();
  showPage('dashboard');
}

function showPage(id){
  currentPage=id;
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.d-item').forEach(b=>b.classList.remove('active'));
  const pg=document.getElementById('pg-'+id);
  if(pg){pg.classList.add('active');pg.innerHTML=buildPage(id);}
  const di=document.getElementById('di-'+id);if(di)di.classList.add('active');
  const labels={dashboard:t('dashboard'),sales:t('sales'),closeday:t('closeday'),menu:t('menu'),inventory:t('inventory'),endstock:t('endstock'),revenue:t('revenue'),settings:t('settings')};
  const lbl=document.getElementById('pg-lbl');if(lbl)lbl.textContent=labels[id]||id;
  document.getElementById('mc')?.scrollTo(0,0);
  // Update store color CSS var
  if(STORES[currentStore]){
    document.documentElement.style.setProperty('--store-color', STORES[currentStore].color);
    document.documentElement.style.setProperty('--store-bg', STORES[currentStore].bg);
    document.documentElement.style.setProperty('--store-lt', STORES[currentStore].lt);
  }
}

function buildPage(id){
  const pages={
    dashboard:bDash, sales:bSales, closeday:bCloseDay,
    menu:bMenu, inventory:bInv, endstock:bEndStock,
    revenue:bRevenue, settings:bSettings
  };
  return (pages[id]||(() => ''))();
}

async function recordSale(){
  const amt=parseFloat(document.getElementById('sale-amt')?.value||0);
  if(!amt||amt<=0){alert('Please enter an amount.');return;}
  const note=document.getElementById('sale-note')?.value||'';
  try{
    const sale=await api('POST',`/api/stores/${currentStore}/sales`,{
      amount_usd:amt, payment_method:selectedPay, note, recorded_by:me.username
    });
    salesData[currentStore].push(sale);
    const stats=storeStats[currentStore]||{};
    if(selectedPay==='cash') stats.cash_total=(parseFloat(stats.cash_total)||0)+amt;
    stats.grand_total=(parseFloat(stats.grand_total)||0)+amt;
    storeStats[currentStore]=stats;
    showPage('sales');
  }catch(e){
    // Offline — save locally
    salesData[currentStore].push({id:Date.now(),amount_usd:amt,payment_method:selectedPay,note,created_at:new Date().toISOString()});
    showPage('sales');
  }
}

function fmtKHRInput(val){
  // Format number with commas for display
  const n=parseFloat(val)||0;
  return n.toLocaleString('en-US');

function formatUSDLive(el){
  const raw=(el.value||'').replace(/[^0-9.]/g,'');
  // Allow typing decimals
  if(raw===''||raw==='.'||raw.endsWith('.')||raw.match(/\.\d$/)){
    el.value=raw; return;
  }
  const num=parseFloat(raw);
  if(isNaN(num)){el.value='';return;}
  // Only format if more than 3 digits before decimal
  const parts=raw.split('.');
  if(parts[0].length>3){
    const formatted=num.toLocaleString('en-US',{minimumFractionDigits:parts[1]!==undefined?parts[1].length:0,maximumFractionDigits:2});
    el.value=formatted;
  }
}

function formatKHRLive(el){
  // Get raw digits only
  const pos=el.selectionStart;
  const raw=(el.value||'').replace(/[^0-9]/g,'');
  if(!raw){el.value='';return;}
  // Format with commas
  const formatted=parseInt(raw,10).toLocaleString('en-US');
  el.value=formatted;
  // Try to keep cursor position reasonable
  try{el.setSelectionRange(formatted.length,formatted.length);}catch(e){}
}

  const usd=parseFloat(rawUSD)||0;
  const rawKHR=(document.getElementById('cash-khr')?.value||'0').replace(/,/g,'');
  const khr=parseFloat(rawKHR)||0;
  const total=usd+khr/RATE;
  const el=document.getElementById('cd-cash-total');if(el)el.textContent=fmt(total);

function takePh(i){
  document.getElementById('esfile-'+i)?.click();
}
function handleEsPhoto(i, input){
  const file=input.files[0];
  if(!file) return;
  if(file.size>5000000){alert('Photo too large. Max 5MB.');return;}
  const reader=new FileReader();
  reader.onload=function(e){
    stkPh[i]=e.target.result; // store base64
    // Re-render just this item's photo section
    const total=(invData[currentStore]||[]).filter(it=>it.count_daily).length;
    const done=Object.keys(stkPh).length;
    const pct=Math.round(done/total*100);
    const pf=document.querySelector('.prog-fill');if(pf)pf.style.width=pct+'%';
    const pt=document.getElementById('prog-txt');if(pt)pt.textContent=`${done} ${t('ofLabel')} ${total} ${t('photosLabel')}`;
    // Refresh page to show photo preview
    showPage('endstock');
  };
  reader.readAsDataURL(file);
}

async function submitES(){
  const s=currentStore, items=(invData[s]||[]).filter(it=>it.count_daily);
  const total=items.length, done=Object.keys(stkPh).length;
  const w=document.getElementById('es-warn');
  if(done<total){w.style.display='block';w.textContent=`${total-done} photo(s) missing.`;return;}
  w.style.display='none';
  const payload=items.map((it,i)=>({id:it.id,quantity:parseFloat(document.getElementById('esq-'+i)?.value)||it.quantity,status:document.getElementById('esst-'+i)?.value||it.status}));
  try{
    await api('POST',`/api/stores/${s}/inventory/endstock`,{items:payload,submitted_by:me.username});
    // Refresh inventory data so dashboard updates
    const freshInv=await api('GET',`/api/stores/${s}/inventory`);
    if(freshInv&&Array.isArray(freshInv))invData[s]=freshInv;
  }catch(e){console.warn('endstock submit:',e.message);}
  document.getElementById('es-form').style.display='none';
  document.getElementById('es-suc').style.display='block';
}
function resetES(){stkPh={};showPage('endstock');}

async function loadRange(){
  const from=document.getElementById('rev-from')?.value;
  const to=document.getElementById('rev-to')?.value;
  const storeId=currentStore;
  const el=document.getElementById('rev-range-data');
  if(!el||!from||!to) return;
  el.innerHTML='<div style="text-align:center;padding:16px;color:var(--t3);">Loading...</div>';
  try{
    const data=await api('GET',`/api/stores/${storeId}/revenue/range?from=${from}&to=${to}`);
    const salesMap={};
    data.sales.forEach(r=>salesMap[r.date]={cash:parseFloat(r.cash),total:parseFloat(r.total),count:parseInt(r.count)});
    const abaMap={};
    data.aba.forEach(r=>abaMap[r.date]={aba:parseFloat(r.aba_total)});
    
    // Combine all dates
    const allDates=[...new Set([...Object.keys(salesMap),...Object.keys(abaMap)])].sort();
    let grandTotal=0, cashTotal=0, abaTotal=0;
    
    const rows=allDates.map(d=>{
      const s=salesMap[d]||{cash:0,total:0,count:0};
      const a=abaMap[d]||{aba:0};
      const dayTotal=s.total+a.aba;
      grandTotal+=dayTotal; cashTotal+=s.cash; abaTotal+=a.aba;
      return `<div class="row">
        <div><div style="font-size:12px;font-weight:600;">${new Date(d+'T00:00:00').toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'})}</div>
        <div style="font-size:10px;color:var(--t3);">${s.count} orders · Cash ${fmt(s.cash)} · ABA ${fmt(a.aba)}</div></div>
        <span style="font-weight:700;color:var(--g);">${fmt(dayTotal)}</span>
      </div>`;
    }).join('');

    el.innerHTML=`
    <div class="combined-card" style="background:var(--g);margin-bottom:10px;">
      <div class="gt-label">${from} → ${to}</div>
      <div class="gt-val">${fmt(grandTotal)}</div>
      <div class="gt-khr">${fmtK(grandTotal)}</div>
      <div class="gt-breakdown">
        <div class="gt-part"><div class="gt-part-lbl">Cash</div><div class="gt-part-val">${fmt(cashTotal)}</div></div>
        <div class="gt-part" style="background:rgba(255,255,255,0.08);"><div class="gt-part-lbl">ABA</div><div class="gt-part-val">${fmt(abaTotal)}</div></div>
      </div>
    </div>
    <div class="card"><div class="cb">${rows||'<div style="text-align:center;padding:12px;color:var(--t3);">No data in this range</div>'}</div></div>`;
  }catch(e){
    el.innerHTML='<div style="text-align:center;padding:16px;color:var(--red);font-size:12px;">Failed to load.</div>';
  }
}

async function uploadLogo(input){
  const file=input.files[0];if(!file)return;
  if(file.size>2000000){alert('Image too large. Max 2MB.');return;}
  const reader=new FileReader();
  reader.onload=async(e)=>{
    const base64=e.target.result;
    try{
      await api('POST','/api/logo',{logo:base64});
      logoUrl=base64;
      localStorage.setItem('nila_logo',base64);
      showPage('settings');
      // Update login logo if visible
      const loginLogo=document.querySelector('.login-logo img');
      if(loginLogo)loginLogo.src=base64;
      // Update drawer logo
      const drawerLogo=document.querySelector('.d-logo-ico img');
      if(drawerLogo)drawerLogo.src=base64;
      alert('Logo updated successfully!');
    }catch(e){alert('Failed to save logo: '+e.message);}
  };
  reader.readAsDataURL(file);
}

async function togglePerm(userIdx,perm,el){
  const u=usersData[userIdx];
  u.perms[perm]=!u.perms[perm];
  const on=u.perms[perm];
  el.className='perm-item'+(on?' on':'');
  const chkEl=el.querySelector('.pchk');if(chkEl){chkEl.className='pchk'+(on?' on':'');chkEl.innerHTML=on?chk():'';}
  const sp=el.querySelector('span');if(sp){sp.style.color=on?'var(--gt)':'';sp.style.fontWeight=on?'600':'';}
  try{await api('PUT',`/api/users/${u.id}`,{name:u.name,username:u.username,role:u.role,store_id:u.store_id,perms:u.perms});}catch(e){}
}

// ════════ USERS MODAL ════════
function openUsr(i){eUI=i;const e=i>=0,u=e?usersData[i]:{};
  document.getElementById('usr-t').textContent=e?'Edit user':'Add user';
  document.getElementById('usr-n').value=e?u.name:'';
  document.getElementById('usr-u').value=e?u.username:'';
  document.getElementById('usr-p').value='';
  document.getElementById('usr-s').value=e?(u.store_id||'atm'):'atm';
  document.getElementById('usr-r').value=e?u.role:'staff';
  openM('mod-usr');}

async function saveUsr(){
  const n=document.getElementById('usr-n').value.trim(),u=document.getElementById('usr-u').value.trim(),p=document.getElementById('usr-p').value;
  const s=document.getElementById('usr-s').value,r=document.getElementById('usr-r').value;
  if(!n||!u||(!p&&eUI<0)){alert('Wrong username or password');return;}
  try{
    const body={name:n,username:u,password:p||undefined,role:r,store_id:s,perms:{revenue:r==='owner',menu:r==='owner',inv:true,users:r==='owner',sales:true,endstock:true}};
    if(eUI>=0){await api('PUT',`/api/users/${usersData[eUI].id}`,body);Object.assign(usersData[eUI],{...body,perms:body.perms});}
    else{await api('POST','/api/users',body);usersData=await api('GET','/api/users');}
  }catch(e){alert(e.message);}
  closeM('mod-usr');showPage('settings');
}

// ════════ DELETE ════════
function askDel(type,i){
  delType=type;delIdx=i;
  const s=currentStore;
  const name=type==='menu'?menuData[s][i].name:type==='inv'?invData[s][i].name:usersData[i].name;
  document.getElementById('del-t').textContent='Delete "'+name+'"?';
  document.getElementById('del-b').textContent='This will be permanently removed.';
  openM('mod-del');
}
async function confirmDel(){
  const s=currentStore;
  try{
    if(delType==='menu'){await api('DELETE',`/api/menu/${menuData[s][delIdx].id}`);menuData[s].splice(delIdx,1);closeM('mod-del');showPage('menu');}
    else if(delType==='inv'){await api('DELETE',`/api/inventory/${invData[s][delIdx].id}`);invData[s].splice(delIdx,1);closeM('mod-del');showPage('inventory');}
    else if(delType==='user'){await api('DELETE',`/api/users/${usersData[delIdx].id}`);usersData.splice(delIdx,1);closeM('mod-del');showPage('settings');}
  }catch(e){
    if(delType==='menu'){menuData[s].splice(delIdx,1);closeM('mod-del');showPage('menu');}
    else if(delType==='inv'){invData[s].splice(delIdx,1);closeM('mod-del');showPage('inventory');}
  }
}

// ════════ MODALS ════════
function openM(id){document.getElementById(id).classList.add('open');}
function closeM(id){document.getElementById(id).classList.remove('open');}

// ════════ PHOTO UPLOADS ════════
document.getElementById('mm-file').addEventListener('change',function(){
  const f=this.files[0];if(!f)return;
  const r=new FileReader();r.onload=e=>{pendingImg=e.target.result;document.getElementById('mm-ph').innerHTML=`<img src="${e.target.result}" style="width:100%;height:88px;object-fit:cover;">`;};
  r.readAsDataURL(f);this.value='';
});
document.getElementById('mi-file').addEventListener('change',function(){
  const f=this.files[0];if(!f)return;
  const r=new FileReader();r.onload=e=>{pendingImg=e.target.result;document.getElementById('mi-ph').innerHTML=`<img src="${e.target.result}" style="width:100%;height:88px;object-fit:cover;">`;};
  r.readAsDataURL(f);this.value='';
});

// ════════ SERVICE WORKER ════════
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}

// ════════ AUTO-LOGIN ════════
async function tryLoadData(attempt=0){
  try{
    await loadAllData();
  }catch(e){
    if(attempt<5){
      const delay=[2000,3000,5000,8000,10000][attempt]||5000;
      setTimeout(()=>tryLoadData(attempt+1), delay);
    }
  }
}

async function init(){
  const savedLang=localStorage.getItem('nila_lang');if(savedLang)lang=savedLang;
  const cachedLogo=localStorage.getItem('nila_logo');if(cachedLogo)logoUrl=cachedLogo;
  await loadLogo(false);
  const saved=localStorage.getItem('nila_token');
  if(saved){
    try{
      const payload=JSON.parse(atob(saved.split('.')[1]));
      if(payload.exp*1000>Date.now()){
        token=saved;
        me={id:payload.id,name:payload.name,username:payload.username,role:payload.role,store_id:payload.store_id,perms:payload.perms};
        currentStore=me.store_id||'atm';
        render();
        try{await loadLogo(true);await loadAllData();startAutoRefresh();}catch(e){console.warn('Auto-login data load:',e);}
        showPage('dashboard');
        return;
      }
    }catch(e){}
    localStorage.removeItem('nila_token');
  }
  render();
}

init();
</script>
